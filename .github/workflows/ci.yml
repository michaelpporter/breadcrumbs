name: CI

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: "1.92.0"
                  target: wasm32-unknown-unknown
                  components: rust-src

            - name: Install wasm-pack
              run: cargo install wasm-pack --version 0.15.0 --locked

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Rust tests
              run: bun run wasm:test || exit 1

            - name: TypeScript tests
              run: bun run test || exit 1

            - name: Check wasm/pkg is up to date
              run: |
                  bun run wasm:build
                  if ! git diff --quiet -- wasm/pkg; then
                      echo "::error::wasm/pkg is out of date with wasm/src. Run 'bun run wasm:build' and commit the regenerated wasm/pkg/."
                      git diff --stat -- wasm/pkg
                      exit 1
                  fi

            - name: Build
              run: bun run build || exit 1
