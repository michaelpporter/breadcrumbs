# SOURCE: https://docs.obsidian.md/Plugins/Releasing/Release+your+plugin+with+GitHub+Actions
name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write

        steps:
            - uses: actions/checkout@v6

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable
                  target: wasm32-unknown-unknown

            - name: Install wasm-pack and wasm-bindgen-cli
              run: |
                  cargo install wasm-pack --locked
                  cargo install wasm-bindgen-cli --version 0.2.100 --locked

            - name: Set stable
              run: cd wasm && rustup override set stable && rustup component add rust-src --toolchain stable-x86_64-unknown-linux-gnu && cd ..

            - name: Build plugin
              run: |
                  bun install --frozen-lockfile
                  bun run wasm:test || exit 1
                  bun run test || exit 1
                  bun run build || exit 1

            - name: Attest build artifacts
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: |
                      main.js
                      styles.css
                      wasm/pkg/breadcrumbs_graph_wasm_bg.wasm

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  prerelease_flag=""
                  if [[ "$tag" == *beta* ]]; then
                    prerelease_flag="--prerelease"
                  fi

                  gh release create "$tag" \
                    --title="$tag" \
                    $prerelease_flag \
                    main.js manifest.json styles.css
