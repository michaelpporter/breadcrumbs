version: 2
updates:
  # JS/TS dependencies (bun.lock + package.json)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      js-dependencies:
        patterns: ["*"]

  # Rust/WASM graph engine
  - package-ecosystem: "cargo"
    directory: "/wasm"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions:
        patterns: ["*"]
